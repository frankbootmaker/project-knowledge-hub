name: knowledge-hub-dev

services:
  postgres:
    # pgvector-enabled Postgres 16 (Milestone 10). Existing volumes usually keep data
    # across this image swap; do not use `down -v` unless you intend to wipe data.
    image: pgvector/pgvector:pg16
    container_name: knowledge-hub-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: knowledge_hub
      POSTGRES_USER: knowledge_hub
      POSTGRES_PASSWORD: knowledge_hub
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - knowledge_hub_dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U knowledge_hub -d knowledge_hub']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - knowledge_hub_dev_net

  redis:
    image: redis:7-alpine
    container_name: knowledge-hub-dev-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - knowledge_hub_dev_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - knowledge_hub_dev_net

  api:
    profiles: ['full']
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: knowledge-hub-dev-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_ENV: development
      API_PORT: 3101
      DATABASE_URL: postgres://knowledge_hub:knowledge_hub@postgres:5432/knowledge_hub
      REDIS_URL: redis://redis:6379
      WEB_URL: http://localhost:3100
      API_URL: http://localhost:3101
      LOG_LEVEL: info
      BACKUP_DIR: /backups
    volumes:
      - knowledge_hub_dev_backups:/backups
    ports:
      - '127.0.0.1:3101:3101'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3101/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - knowledge_hub_dev_net

  worker:
    profiles: ['full']
    build:
      context: .
      dockerfile: infrastructure/docker/worker.Dockerfile
    container_name: knowledge-hub-dev-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_ENV: development
      DATABASE_URL: postgres://knowledge_hub:knowledge_hub@postgres:5432/knowledge_hub
      REDIS_URL: redis://redis:6379
      WEB_URL: http://localhost:3100
      API_URL: http://localhost:3101
      WEB_PORT: 3100
      API_PORT: 3101
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - knowledge_hub_dev_net

  web:
    profiles: ['full']
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
      args:
        NEXT_REWRITE_API_ORIGIN: ${INTERNAL_API_URL:-http://api:3101}
    container_name: knowledge-hub-dev-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_ENV: development
      WEB_PORT: 3100
      API_URL: http://api:3101
      WEB_URL: http://localhost:3100
      DATABASE_URL: postgres://knowledge_hub:knowledge_hub@postgres:5432/knowledge_hub
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    ports:
      - '127.0.0.1:3100:3100'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3100').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - knowledge_hub_dev_net

  # Optional local Ops-0 scheduler: docker compose --profile backup up -d db-backup
  db-backup:
    profiles: ['backup']
    image: pgvector/pgvector:pg16
    container_name: knowledge-hub-dev-db-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: knowledge_hub
      POSTGRES_USER: knowledge_hub
      POSTGRES_PASSWORD: knowledge_hub
      BACKUP_DIR: /backups
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_KEEP_DAILY: ${BACKUP_KEEP_DAILY:-7}
      BACKUP_KEEP_WEEKLY: ${BACKUP_KEEP_WEEKLY:-4}
      BACKUP_KEEP_MONTHLY: ${BACKUP_KEEP_MONTHLY:-3}
      BACKUP_RUN_ON_START: ${BACKUP_RUN_ON_START:-1}
    volumes:
      - knowledge_hub_dev_backups:/backups
      - ./infrastructure/scripts:/scripts:ro
    entrypoint: ['/bin/bash', '/scripts/backup-loop.sh']
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - knowledge_hub_dev_net

volumes:
  knowledge_hub_dev_postgres_data:
    name: knowledge_hub_dev_postgres_data
  knowledge_hub_dev_redis_data:
    name: knowledge_hub_dev_redis_data
  knowledge_hub_dev_backups:
    name: knowledge_hub_dev_backups

networks:
  knowledge_hub_dev_net:
    name: knowledge_hub_dev_net
