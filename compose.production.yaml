# Lightweight production-oriented overrides for the local Compose stack.
# For Dokploy Dev/UAT, prefer `compose.dokploy.yaml` (private PG/Redis + migrate one-shot).
#
# Usage (local full stack with always-restart):
#   docker compose -p knowledge-hub-dev -f compose.yaml -f compose.production.yaml --profile full up --build

services:
  api:
    restart: always
  worker:
    restart: always
  web:
    restart: always
    build:
      args:
        NEXT_REWRITE_API_ORIGIN: ${INTERNAL_API_URL:-http://api:3101}
  postgres:
    restart: always
  redis:
    restart: always
